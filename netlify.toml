[build]
  base    = "frontend"
  publish = "dist"
  command = "npm run build"

# Portfolio + sample pages are server-rendered by the backend and served from
# its own domain (api.wlelo.com), so the frontend links straight there. These
# redirects only keep any older wlelo.com/p/* and /sample/* links working by
# sending them to the backend (301 so the browser lands on the working domain,
# where /static and /uploads resolve correctly).
[[redirects]]
  from   = "/p/*"
  to     = "https://api.wlelo.com/p/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "/sample/*"
  to     = "https://api.wlelo.com/sample/:splat"
  status = 301
  force  = true

# SPA fallback — all routes handled by React Router
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
