[build]
  base    = "frontend"
  publish = "dist"
  command = "npm run build"

# API base the React app is built against (Railway-hosted FastAPI).
# Not a secret — it's a public URL — so it's fine to commit here.
[build.environment]
  VITE_API_BASE = "https://portfolio-studio-api-production-fdf4.up.railway.app"
  # Public site origin — makes the editor show wlelo.com/p/<user> as the URL.
  VITE_PUBLIC_SITE = "https://wlelo.com"

# --- Serve backend-rendered portfolio pages under wlelo.com ------------------
# These are 200 rewrites (proxies), not 301 redirects, so the browser URL stays
# https://wlelo.com/p/<user> while the HTML comes from the Railway backend.
# We must also proxy the assets those pages reference (/static css, /uploads
# images) or they'd 404 against the SPA. The frontend uses /assets (Vite), so
# /static and /uploads never clash with it. Specific rules come BEFORE the SPA
# catch-all — Netlify uses the first matching rule.
[[redirects]]
  from   = "/p/*"
  to     = "https://portfolio-studio-api-production-fdf4.up.railway.app/p/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/sample/*"
  to     = "https://portfolio-studio-api-production-fdf4.up.railway.app/sample/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/static/*"
  to     = "https://portfolio-studio-api-production-fdf4.up.railway.app/static/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/uploads/*"
  to     = "https://portfolio-studio-api-production-fdf4.up.railway.app/uploads/:splat"
  status = 200
  force  = true

# SPA fallback — all other routes handled by React Router
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
