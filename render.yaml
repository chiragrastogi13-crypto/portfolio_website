services:
  - type: web
    name: portfolio-studio-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-studio-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: USE_PATH_URLS
        value: true
      - key: BASE_PORT
        value: 443
      - key: BASE_HOST
        value: portfolio-studio-api.onrender.com   # update after first deploy
      - key: FRONTEND_ORIGINS
        value: https://your-app.netlify.app         # update after Netlify deploy
      - key: ADMIN_EMAIL
        value: admin@portfolio.studio
      - key: ADMIN_PASSWORD
        generateValue: true

databases:
  - name: portfolio-studio-db
    databaseName: portfolio_studio
    user: portfolio_user
    plan: free
